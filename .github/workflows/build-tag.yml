name: Build and Release Arch Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Build job: produces unsigned .pkg.tar.zst files and uploads them as
  # workflow artifacts for the sign-and-release job to pick up.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Initialize pacman keyring
        run: |
          pacman-key --init
          pacman-key --populate archlinux

      - name: Update system and install build tools
        # ccache is installed here; we enable it in makepkg.conf below.
        run: |
          pacman -Syu --noconfirm --needed base-devel git sudo ccache

      - name: Create a non-root user for makepkg
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Give the builder user ownership of the workspace
        run: chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Restore ccache
        # The key changes every run (so a new cache entry is always saved),
        # but restore-keys let us fall back to the most recent previous cache.
        uses: actions/cache@v4
        with:
          path: /home/builder/.ccache
          key: ccache-${{ runner.os }}-${{ hashFiles('PKGBUILD') }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ hashFiles('PKGBUILD') }}-
            ccache-${{ runner.os }}-

      - name: Configure makepkg and ccache
        run: |
          # Ensure the ccache dir exists and is owned by builder.
          mkdir -p /home/builder/.ccache
          chown -R builder:builder /home/builder/.ccache

          # BUILDENV default is (!distcc color !ccache check !sign).
          # Flip !ccache to ccache; cap the cache to stay well under GitHub's
          # 10 GB per-repo cache quota.
          cat > /home/builder/.makepkg.conf <<EOF
          MAKEFLAGS="-j\$(nproc)"
          COMPRESSZST=(zstd -c -z -q --threads=0 -)
          BUILDENV=(!distcc color ccache check !sign)
          EOF
          chown builder:builder /home/builder/.makepkg.conf

          sudo -u builder ccache --max-size=2G
          sudo -u builder ccache --zero-stats

      - name: Import upstream source signing keys
        run: |
          sudo -u builder bash -c '
            set -e
            source ./PKGBUILD
            if [ "${#validpgpkeys[@]}" -gt 0 ]; then
              for key in "${validpgpkeys[@]}"; do
                echo "Fetching $key"
                gpg --keyserver hkps://keyserver.ubuntu.com --recv-keys "$key" \
                  || gpg --keyserver hkps://keys.openpgp.org  --recv-keys "$key"
              done
            fi
          '

      - name: Build the package
        env:
          BUILD_DOCS: 1
        run: sudo -u builder makepkg -s --noconfirm --clean

      - name: ccache statistics
        run: sudo -u builder ccache --show-stats

      - name: Upload built packages as artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-packages
          path: '*.pkg.tar.zst'
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Sign & release job: downloads the built packages, signs each one directly
  # with gpg (so errors surface clearly), and publishes a GitHub Release.
  # Runs only for tag pushes. If this job fails, re-run just this job from the
  # Actions UI — no rebuild required.
  # ---------------------------------------------------------------------------
  sign-and-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: arch-packages

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --with-colons \
                   | awk -F: '/^sec/ {print $5; exit}')
          echo "GPG_KEY_ID=$KEY_ID" >> "$GITHUB_ENV"
          echo "Imported key: $KEY_ID"

      - name: Sign each package
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -e
          for pkg in *.pkg.tar.zst; do
            echo "Signing $pkg"
            # --passphrase-fd 0 reads the passphrase from stdin on each call,
            # so we don't depend on gpg-agent caching anything across the job.
            echo "$GPG_PASSPHRASE" | gpg \
              --batch --yes --pinentry-mode loopback \
              --passphrase-fd 0 \
              --local-user "$GPG_KEY_ID" \
              --detach-sign --no-armor \
              --output "${pkg}.sig" "$pkg"
            # Verify immediately so a bad signature fails this job loudly.
            gpg --verify "${pkg}.sig" "$pkg"
          done
          ls -lh *.pkg.tar.zst *.pkg.tar.zst.sig

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.pkg.tar.zst
            *.pkg.tar.zst.sig
          generate_release_notes: true
